name: CI/CD Innovatech Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    name: Construir, Subir a ECR y Desplegar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v3

      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Iniciar sesión en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

# 1. CONSTRUIR Y SUBIR BACK-VENTAS
      - name: Build y Push Back-Ventas
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: innovatech-ep2-backend
          IMAGE_TAG: ventas 
        run: |
          cd backend/back-Ventas_SpringBoot/Springboot-API-REST
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 2. CONSTRUIR Y SUBIR BACK-DESPACHOS
      - name: Build y Push Back-Despachos
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: innovatech-ep2-backend
          IMAGE_TAG: despachos 
        run: |
          cd backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

# 3. CONSTRUIR Y SUBIR FRONTEND
      - name: Build y Push Frontend
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: innovatech-ep2-frontend
          IMAGE_TAG: latest
        run: |
          cd frontend/front_despacho # <--- ¡Aquí está la corrección de la ruta!
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
    # 4. DESPLIEGUE EN ECS (El paso clave del CD)
      - name: Forzar nuevo despliegue en ECS
        run: |
          aws ecs update-service --cluster innovatech-ep2-cluster --service app --force-new-deployment