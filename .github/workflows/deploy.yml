name: CI/CD Innovatech EP3 EKS

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    name: Build, push a ECR y deploy a EKS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: innovatech-ep3-eks
      PROJECT_NAME: innovatech-ep3

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login con Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Obtener Account ID y URLs ECR
        run: |
          echo "ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV
          echo "FRONTEND_ECR=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-frontend" >> $GITHUB_ENV
          echo "VENTAS_ECR=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-ventas" >> $GITHUB_ENV
          echo "DESPACHOS_ECR=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${AWS_REGION}.amazonaws.com/${PROJECT_NAME}-despachos" >> $GITHUB_ENV

      - name: Build Backend Ventas
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $VENTAS_ECR:${GITHUB_SHA} \
            -t $VENTAS_ECR:latest \
            ./backend/back-Ventas_SpringBoot/Springboot-API-REST \
            --load

      - name: Push Backend Ventas
        run: |
          docker push $VENTAS_ECR:${GITHUB_SHA}
          docker push $VENTAS_ECR:latest

      - name: Build Backend Despachos
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $DESPACHOS_ECR:${GITHUB_SHA} \
            -t $DESPACHOS_ECR:latest \
            ./backend/back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO \
            --load

      - name: Push Backend Despachos
        run: |
          docker push $DESPACHOS_ECR:${GITHUB_SHA}
          docker push $DESPACHOS_ECR:latest

      - name: Build Frontend
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $FRONTEND_ECR:${GITHUB_SHA} \
            -t $FRONTEND_ECR:latest \
            ./frontend/front_despacho \
            --load

      - name: Push Frontend
        run: |
          docker push $FRONTEND_ECR:${GITHUB_SHA}
          docker push $FRONTEND_ECR:latest

      - name: Instalar kubectl
        uses: azure/setup-kubectl@v4

      - name: Conectar kubectl con EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $CLUSTER_NAME

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f infra/k8s/mysql.yml
          kubectl apply -f infra/k8s/backend-ventas.yml
          kubectl apply -f infra/k8s/backend-despachos.yml
          kubectl apply -f infra/k8s/frontend.yml
          kubectl apply -f infra/k8s/hpa.yml

      - name: Actualizar imagen Backend Ventas
        run: |
          kubectl set image deployment/backend-ventas \
            back-ventas=$VENTAS_ECR:${GITHUB_SHA}

      - name: Actualizar imagen Backend Despachos
        run: |
          kubectl set image deployment/backend-despachos \
            back-despachos=$DESPACHOS_ECR:${GITHUB_SHA}

      - name: Actualizar imagen Frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=$FRONTEND_ECR:${GITHUB_SHA}

      - name: Esperar rollout
        run: |
          kubectl rollout status deployment/backend-ventas --timeout=300s
          kubectl rollout status deployment/backend-despachos --timeout=300s
          kubectl rollout status deployment/frontend --timeout=300s

      - name: Mostrar estado final del cluster
        run: |
          kubectl get pods -o wide
          kubectl get svc -o wide
          kubectl get hpa